<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>EduPortal</title>
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduPortal" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=192&h=192&fit=crop&q=80" />
    
    <!-- Mobile optimizations: prevent pull-to-refresh on iOS, custom utility styling -->
    <style>
      body {
        overscroll-behavior-y: contain;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body class="h-full overflow-x-hidden bg-slate-50 dark:bg-slate-900">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
